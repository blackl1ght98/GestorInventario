# Red virtual interna para que los contenedores se comuniquen entre sĂ­ por nombre
networks:
  gestor:
    driver: bridge # modo bridge: red local aislada, el mĂˇs comĂşn para desarrollo
  
services:
  sql-server:
    # Imagen oficial de SQL Server 2025 de Microsoft para Linux
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: SQL-Server-Local
    user: root # Forzamos ejecuciĂłn como root para evitar problemas de permisos con archivos
    environment:
      - ACCEPT_EULA=Y # Aceptar licencia de SQL Server (obligatorio)
      - MSSQL_SA_PASSWORD=${DB_SA_PASSWORD} # ContraseĂ±a del usuario administrador 'sa'
      - MSSQL_PID=Developer # EdiciĂłn Developer, gratuita para desarrollo
    ports:
      # Puerto 1433 es el estĂˇndar de SQL Server
      # Formato: puertoMĂˇquinaLocal:puertoContenedor
      - '1433:1433'
    volumes:
      # Volumen nombrado que persiste los datos de SQL Server entre reinicios
      # /var/opt/mssql es la ruta estĂˇndar de SQL Server en Linux (definida por Microsoft)
      - sql-data-new:/var/opt/mssql

      # Monta el archivo .bak de tu mĂˇquina dentro del contenedor
      # ./GestorInventario-2026-05-02.bak â†’ ruta relativa en tu mĂˇquina (donde estĂˇ el docker-compose.yml)
      # /var/opt/mssql/data/...bak â†’ ruta dentro del contenedor donde SQL Server puede acceder al archivo
      # Es importante que donde pongamos el .bak dentro del contenedor sea una ruta que SQL Server pueda leer, por eso lo ponemos dentro de /var/opt/mssql/data, aunque ponemos aqui el .bak solo para poder
      # restaurar la base de datos, luego el .bak no es necesario y se puede eliminar o mover a otra carpeta dentro del contenedor para mantener el contenedor mĂˇs limpio, aqui solo van archivos .mdf y .ldf
      #que son los archivos de datos y log de SQL Server, el .bak es solo para la restauraciĂłn inicial
      - ./GestorInventario-2026-06-18.bak:/var/opt/mssql/data/GestorInventario-2026-06-18.bak

    healthcheck:
      # Comprueba si SQL Server estĂˇ listo ejecutando SELECT 1
      # Otros servicios que dependan de sql-server esperarĂˇn hasta que esto tenga Ă©xito
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U ${DB_SA_USERNAME} -P ${DB_SA_PASSWORD} -Q "SELECT 1" || exit 1
      interval: 10s # Comprueba cada 10 segundos
      timeout: 5s # Espera mĂˇximo 5 segundos por comprobaciĂłn
      retries: 10 # Reintenta hasta 10 veces antes de marcar como no saludable

    command:
      - /bin/bash
      - -c
      - |
        # Iniciar SQL Server en segundo plano con & para que el script pueda continuar
        /opt/mssql/bin/sqlservr &

        # Esperamos 30 segundos a que SQL Server arranque completamente
        # antes de intentar ejecutar comandos SQL
        sleep 30

        # ============ RESTAURACIĂ“N DE LA BASE DE DATOS DESDE EL BACKUP .BAK (asegurar compatibilidad con versiones que no instalen lo necesario) ===========
        # Instalamos sqlcmd para poder ejecutar comandos SQL desde la terminal
        # Esto garantiza retrocompatibilidad con imĂˇgenes que no lo traigan preinstalado
        apt-get update && apt-get install -y curl gnupg
        # AĂ±adimos el repositorio oficial de Microsoft
        curl https://packages.microsoft.com/keys/microsoft.asc | apt-key add -
        curl https://packages.microsoft.com/config/ubuntu/20.04/prod.list > /etc/apt/sources.list.d/mssql-release.list
        apt-get update
        ACCEPT_EULA=Y apt-get install -y mssql-tools
        # AĂ±adimos mssql-tools al PATH para poder usarlo desde cualquier directorio
        echo 'export PATH="$PATH:/opt/mssql-tools/bin"' >> ~/.bashrc
        source ~/.bashrc
        # ===================================================================================================================================

        # =========================== RESTAURACION DE LA BD ===================================================================================
        # Explicacion de los parametros usados:
        # -S localhost        â†’ servidor SQL Server local
        # -U ${DB_SA_USERNAME}   â†’ usuario administrador
        # -P ${DB_SA_PASSWORD}â†’ contraseĂ±a desde variable de entorno
        # -C                  â†’ ignorar validaciĂłn de certificado SSL
        # En la ruta /opt/mssql-tools18/bin/sqlcmd se encuentra el ejecutable de sqlcmd, que es la herramienta de lĂ­nea de comandos para ejecutar consultas SQL, y 
        # lo usamos para ejecutar el comando RESTORE DATABASE con las opciones necesarias para restaurar desde el .bak montado en el volumen. Si la restauraciĂłn falla, 
        # se muestra un mensaje de error en los logs del contenedor.
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U ${DB_SA_USERNAME} -P ${DB_SA_PASSWORD} -C -Q "
        RESTORE DATABASE GestorInventario 
        -- Ruta donde pusimos el .back (mirar volumes ya que en esa seccion es donde decimos que va a estar ahi)
        FROM DISK = '/var/opt/mssql/data/GestorInventario-2026-06-18.bak'
        WITH  
        -- Extraemos del .back los archivos .mdf y .ldf y lo dejamos en el directorio /var/opt/mssql/data
        MOVE 'GestorInventario' TO '/var/opt/mssql/data/GestorInventario.mdf',  
        MOVE 'GestorInventario_log' TO '/var/opt/mssql/data/GestorInventario_log.ldf',
        FILE = 12, REPLACE, RECOVERY;" || echo "RESTORE FALLĂ“ - revisa logs arriba";
     
        echo "AQUI EMPIEZA CREACION";
        echo "SQLUSER=${DB_SQLUSER}";
        echo "SQLUSER_PASSWORD_LENGTH=${DB_SQLUSER_PASSWORD}";
        
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U ${DB_SA_USERNAME} -P "${DB_SA_PASSWORD}" -C -Q "
        PRINT 'DENTRO DEL SQLCMD DE CREACION';
        USE [GestorInventario];
        IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = '${DB_SQLUSER}')
            CREATE LOGIN [${DB_SQLUSER}] WITH PASSWORD = '${DB_SQLUSER_PASSWORD}';
        
        USE [GestorInventario];
        IF EXISTS (SELECT 1 FROM sys.database_principals WHERE name = '${DB_SQLUSER}' AND type = 'S')
            ALTER USER [${DB_SQLUSER}] WITH LOGIN = [${DB_SQLUSER}];
        ELSE
            CREATE USER [${DB_SQLUSER}] FOR LOGIN [${DB_SQLUSER}];
        
        ALTER ROLE db_datareader ADD MEMBER [${DB_SQLUSER}];
        ALTER ROLE db_datawriter ADD MEMBER [${DB_SQLUSER}];
        ALTER LOGIN [${DB_SQLUSER}] WITH DEFAULT_DATABASE = [GestorInventario];
        
        GRANT EXECUTE TO [${DB_SQLUSER}];" || echo "CREACIĂ“N DE USUARIO FALLĂ“";
        
        echo "AQUI TERMINA CREACION, CODIGO=$?";

        # Mantiene el contenedor en ejecuciĂłn esperando al proceso de SQL Server en segundo plano
        wait
    networks:
      - gestor

  gestorinventario:
    container_name: gestor-inventario
    # Imagen construida desde el Dockerfile en el directorio actual
    image: ${DOCKER_REGISTRY-}gestorinventario
    build:
      context: . # Directorio raĂ­z del proyecto como contexto de build
      dockerfile: Dockerfile
    ports:
      # 8080: HTTP, 8081: HTTPS
      # Formato: puertoMĂˇquinaLocal:puertoContenedor
      - '8081:8081'
      - '8080:8080'
     
     
      
    environment:
      - DB_HOST=${DB_HOST}
      - APP_DOCKER_URL=https://localhost:8081
      - DB_NAME=${DB_NAME}
      - DB_SA_USERNAME=${DB_SA_USERNAME}
      - DB_SA_PASSWORD=${DB_SA_PASSWORD}
      - DB_SQLUSER=${DB_SQLUSER}
      - DB_SQLUSER_PASSWORD=${DB_SQLUSER_PASSWORD}
      - IS_DOCKER=true # Flag para que la app sepa que estĂˇ en Docker
      - USE_REDIS=true # Flag para que la app sepa que use redis
      - IsMfaEnabled=true
      - CallMeBotUser=@guigamer98
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CertificatePassword}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/certificado.pfx
      - ASPNETCORE_HTTPS_PORTS=8081
     
      - ClaveJWT=${ClaveJWT}
      - REDIS_CONNECTION_STRING=${REDIS_CONNECTION_STRING}
      - AuthMode=${AuthMode}
      - JwtIssuer=${JwtIssuer}
      - JwtAudience=${JwtAudience}
      - LicenseKeyAutoMapper=${LicenseKeyAutoMapper}
      - PublicKey=${PublicKey}
      - PrivateKey=${PrivateKey}
      
      # Credenciales de PayPal
      - Paypal_ClientId=${Paypal_ClientId}
      - Paypal_ClientSecret=${Paypal_ClientSecret}
      - Paypal_Mode=${Paypal_Mode} # sandbox o live
      - Paypal_returnUrlConDocker=${Paypal_returnUrlConDocker} # URL de retorno en Docker
      - Email__Host=${Email__Host}
      - Email__Port=${Email__Port}
      - Email__Username=${Email__Username}
      - Email__Password=${Email__Password}
    volumes:
      # Monta el certificado SSL desde tu mĂˇquina al contenedor
      # ./certs/certificado.pfx â†’ ruta en tu mĂˇquina
      # /https/certificado.pfx  â†’ ruta dentro del contenedor donde Kestrel lo busca
      # :ro â†’ solo lectura, el contenedor no puede modificar el certificado
      - ./certs/certificado.pfx:/https/certificado.pfx:ro
    depends_on:
      # No arranca hasta que SQL Server pase el healthcheck
      sql-server:
        condition: service_healthy
      # No arranca hasta que Redis haya iniciado
      redis:
        condition: service_started
    networks:
      - gestor

  redis:
    image: redis:latest # Imagen oficial de Redis
    container_name: redis
    ports:
      - '6379:6379' # Puerto estĂˇndar de Redis
    volumes:
      # Persiste los datos de Redis entre reinicios del contenedor
      # redisdata â†’ volumen de Docker en tu mĂˇquina
      # /data     â†’ ruta estĂˇndar de datos en la imagen oficial de Redis
      - redisdata:/data
    networks:
      - gestor

volumes:
  sql-data-new: # Volumen para los datos de SQL Server
    driver: local # Almacenado localmente en tu mĂˇquina gestionado por Docker
  redisdata: # Volumen para los datos de Redis
    driver: local
  appdata: # Volumen declarado pero no usado actualmente en ningĂşn servicio
    driver: local